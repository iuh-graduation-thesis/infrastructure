services:
    #  =================================================================
    #  PostgreSQL
    #  =================================================================
    postgres:
        image: postgres:16-alpine
        container_name: graduation-thesis-postgres
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-keycloak}
            POSTGRES_USER: ${POSTGRES_USER:-admin}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
        ports:
            - '5432:5432'
        volumes:
            - graduation-thesis-postgres:/var/lib/postgresql/data
        networks:
            - graduation-thesis
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
            interval: 10s
            timeout: 5s
            retries: 5

    #  =================================================================
    #  MongoDB
    #  =================================================================
    mongodb:
        image: mongo:7
        container_name: graduation-thesis-mongodb
        restart: unless-stopped
        environment:
            MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
            MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-admin}
            MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-admin}
        ports:
            - '27017:27017'
        volumes:
            - graduation-thesis-mongodb:/data/db
        networks:
            - graduation-thesis
        healthcheck:
            test: ['CMD-SHELL', 'mongosh --quiet -u "$$MONGO_INITDB_ROOT_USERNAME" -p "$$MONGO_INITDB_ROOT_PASSWORD" --authenticationDatabase admin --eval "db.adminCommand(''ping'').ok"']
            interval: 10s
            timeout: 5s
            retries: 5

    #  =================================================================
    #  Redis
    #  =================================================================
    redis:
        image: redis:7-alpine
        container_name: graduation-thesis-redis
        restart: unless-stopped
        command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-admin}
        environment:
            REDIS_PASSWORD: ${REDIS_PASSWORD:-admin}
        ports:
            - '6379:6379'
        volumes:
            - graduation-thesis-redis:/data
        networks:
            - graduation-thesis
        healthcheck:
            test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping']
            interval: 10s
            timeout: 5s
            retries: 5

    #  =================================================================
    #  Kafka
    #  =================================================================
    kafka:
        image: apache/kafka:latest
        container_name: graduation-thesis-kafka
        restart: unless-stopped
        healthcheck:
            test: ['CMD-SHELL', '/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s
        ports:
            - '9092:9092'
        environment:
            # [Tổng quan]
            KAFKA_NODE_ID: 1
            KAFKA_PROCESS_ROLES: broker,controller
            # [Listener]
            # INTERNAL: container trong Docker kết nối qua kafka:19092
            # EXTERNAL: app trên máy host kết nối qua localhost:9092
            # CONTROLLER: cổng quản lý metadata
            KAFKA_LISTENERS: 'INTERNAL://:19092,EXTERNAL://:9092,CONTROLLER://:9093'
            KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka:19092,EXTERNAL://localhost:9092'
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
            # [Controller/Quorum]
            # Local 1 node: id=1, địa chỉ kafka:9093.
            KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
            # [Replication/Partition]
            # Local để 1 để khởi động nhanh, ít tốn tài nguyên.
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
            KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
            KAFKA_NUM_PARTITIONS: 3
        volumes:
            - graduation-thesis-kafka:/var/lib/kafka/data
        networks:
            - graduation-thesis

    #  =================================================================
    #  Keycloak
    #  =================================================================
    keycloak:
        image: quay.io/keycloak/keycloak:26.5.2
        container_name: graduation-thesis-keycloak
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    memory: 750M
        command: start --import-realm
        volumes:
            - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm.json:ro
            - ./keycloak/provider:/opt/keycloak/providers
            - ./keycloak-themes:/opt/keycloak/themes:ro
        healthcheck:
            test: ['CMD-SHELL', "bash -ec \"exec 3<>/dev/tcp/127.0.0.1/9000; printf 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; grep -q '200 OK' <&3\""]
            interval: 30s
            timeout: 10s
            retries: 5
            start_period: 40s
        depends_on:
            postgres:
                condition: service_healthy
            kafka:
                condition: service_healthy
        ports:
            - '9000:8080'
            - '9001:9000'
        environment:
            # Database
            KC_DB: postgres
            KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-keycloak}
            KC_DB_USERNAME: ${POSTGRES_USER:-admin}
            KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-admin}
            # Keycloak
            KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
            KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
            # SPI Config
            KAFKA_BOOTSTRAP_SERVER: ${KAFKA_BOOTSTRAP_SERVER:-kafka:19092}
            KEYCLOAK_KAFKA_TOPIC: ${KEYCLOAK_KAFKA_TOPIC:-keycloak-user-events}
            # Health & Metrics
            KC_HEALTH_ENABLED: 'true'
            KC_METRICS_ENABLED: 'true'
            KC_SPI_THEME_CACHE_THEMES: 'false'
            KC_SPI_THEME_CACHE_TEMPLATES: 'false'
            KC_SPI_THEME_STATIC_MAX_AGE: '-1'
            # Network
            KC_HTTP_ENABLED: 'true'
            KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-localhost}
            KC_HOSTNAME_STRICT: ${KEYCLOAK_HOSTNAME_STRICT:-false}
            KC_HOSTNAME_STRICT_HTTPS: ${KEYCLOAK_HOSTNAME_STRICT_HTTPS:-false}
            JAVA_OPTS_APPEND: -Xms256m -Xmx512m
        networks:
            - graduation-thesis

volumes:
    graduation-thesis-postgres:
        name: graduation-thesis-postgres
    graduation-thesis-mongodb:
        name: graduation-thesis-mongodb
    graduation-thesis-redis:
        name: graduation-thesis-redis
    graduation-thesis-kafka:
        name: graduation-thesis-kafka

networks:
    graduation-thesis:
        name: graduation-thesis
        driver: bridge

#  =================================================================
#  Usage
#  =================================================================
#  Start infrastructure:
#    docker compose -f docker-infrastructure.yml up -d
#
#  Stop infrastructure:
#    docker compose -f docker-infrastructure.yml down
#
#  PostgreSQL:
#    Host in Docker: postgres
#    Host on local machine: localhost
#    Port: 5432
#    Database: keycloak
#    Username: admin
#    Password: admin
#
#  MongoDB:
#    Host in Docker: mongodb
#    Host on local machine: localhost
#    Port: 27017
#    Username: admin
#    Password: admin
#    Auth database: admin
#
#  Redis:
#    Host in Docker: redis
#    Host on local machine: localhost
#    Port: 6379
#    Username: leave empty
#    Password: admin
#
#  Kafka:
#    Bootstrap server in Docker: kafka:19092
#    Bootstrap server on local machine: localhost:9092
#
#  Keycloak:
#    URL: http://localhost:9000
#    Health: http://localhost:9001/health/ready
#    Admin username: admin
#    Admin password: admin
