services:
    #  =================================================================
    #  pgAdmin
    #  =================================================================
    pgadmin:
        image: dpage/pgadmin4:latest
        container_name: graduation-thesis-pgadmin
        restart: unless-stopped
        environment:
            PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@iuh.com}
            PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
            PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
        ports:
            - '5050:80'
        volumes:
            - graduation-thesis-pgadmin:/var/lib/pgadmin
            - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
        networks:
            - graduation-thesis

    #  =================================================================
    #  RedisInsight
    #  =================================================================
    redis-insight:
        image: redis/redisinsight:latest
        container_name: graduation-thesis-redis-insight
        restart: unless-stopped
        ports:
            - '5540:5540'
        volumes:
            - graduation-thesis-redis-insight:/data
        networks:
            - graduation-thesis

volumes:
    graduation-thesis-pgadmin:
        name: graduation-thesis-pgadmin
    graduation-thesis-redis-insight:
        name: graduation-thesis-redis-insight

networks:
    graduation-thesis:
        name: graduation-thesis
        external: true

#  =================================================================
#  Usage
#  =================================================================
#  Start infrastructure first:
#    docker compose -f docker-infrastructure.yml up -d
#
#  Start observability tools:
#    docker compose -f docker-observability.yml up -d
#
#  Stop observability tools:
#    docker compose -f docker-observability.yml down
#
#  pgAdmin:
#    URL: http://localhost:5050
#    Login email: admin@iuh.com
#    Login password: admin
#    PostgreSQL host: postgres
#    PostgreSQL port: 5432
#    PostgreSQL database: keycloak
#    PostgreSQL username: admin
#    PostgreSQL password: admin
#
#  RedisInsight:
#    URL: http://localhost:5540
#
#  Connect RedisInsight to Redis from Docker network:
#    Host: redis
#    Port: 6379
#    Username: leave empty
#    Password: admin
#
#  Connect to Redis from an app running on local machine:
#    Host: localhost
#    Port: 6379
#    Username: leave empty
#    Password: admin
